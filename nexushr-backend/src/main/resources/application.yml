spring:
  application:
    name: nexushr-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:NexusHR}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080
  servlet:
    context-path: /

# Custom security / jwt keys
security:
  jwt:
    # Base64-encoded secret key (at least 256 bits). Here is a pre-generated valid secret for development:
    secret-key: ${JWT_SECRET_KEY}
    expiration-time: 86400000 # 24 hours in milliseconds

app:
  notification:
    email:
      enabled: ${APP_NOTIFICATION_EMAIL_ENABLED:true}
      provider: ${APP_NOTIFICATION_EMAIL_PROVIDER:AWS_SES}
    sms:
      enabled: ${APP_NOTIFICATION_SMS_ENABLED:true}
      provider: ${APP_NOTIFICATION_SMS_PROVIDER:Twilio}

