name: CI Build & Test Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    name: Build & Test Backend (Spring Boot)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradle Wrapper
      run: chmod +x nexushr-backend/gradlew

    - name: Build and Package with Gradle
      run: |
        cd nexushr-backend
        ./gradlew build -x test

  build-frontend:
    name: Build Frontend (React + Vite)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: nexushr-frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd nexushr-frontend
        npm ci

    - name: Build Frontend Application
      run: |
        cd nexushr-frontend
        npm run build
