version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: nexushr-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexushr
      POSTGRES_USER: nexushr_user
      POSTGRES_PASSWORD: nexushr_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexushr_user -d nexushr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexushr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
